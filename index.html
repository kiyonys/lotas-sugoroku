<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ロータス経営スゴロク（公開版）</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-head">
    <h1>ロータス経営スゴロク</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="roulette">ルーレット</button>
      <button class="tab" data-tab="board">盤面（デモ）</button>
      <button class="tab" data-tab="docs">資料</button>
    </nav>
  </header>

  <!-- ルーレット -->
  <section id="roulette" class="tabpane active">
    <div class="box">
      <div class="row">
        <div class="roulette-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <div id="wheel" class="wheel" role="img" aria-label="6セグメントルーレット">
            <!-- 6セグメント（1〜6） -->
            <div class="seg" data-n="1"><span class="badge">1</span></div>
            <div class="seg" data-n="2"><span class="badge">2</span></div>
            <div class="seg" data-n="3"><span class="badge">3</span></div>
            <div class="seg" data-n="4"><span class="badge">4</span></div>
            <div class="seg" data-n="5"><span class="badge">5</span></div>
            <div class="seg" data-n="6"><span class="badge">6</span></div>
          </div>
        </div>
      </div>

      <div class="row gap">
        <button id="spinBtn" class="btn">回す</button>
        <label>現在のチーム：
          <select id="teamSel">
            <option value="A">A</option>
            <option value="B">B</option>
          </select>
        </label>
        <div class="status">停止 <span id="result">-</span></div>
      </div>
    </div>
  </section>

  <!-- 盤面 -->
  <section id="board" class="tabpane">
    <div class="box">
      <h2>36マス盤面（デモ）</h2>
      <div id="boardGrid" class="board-grid" aria-label="36マスの盤面"></div>
      <div class="row gap">
        <button id="resetBoard" class="btn-sub">駒リセット</button>
        <div class="status">チーム <span id="teamLabel">A</span>：<span id="posLabel">1</span> マス</div>
      </div>
    </div>
  </section>

  <!-- 資料 -->
  <section id="docs" class="tabpane">
    <div class="box">
      <h2>資料</h2>
      <p>配布物や画像等は <code>downloads/</code> に配置してください。</p>
      <ul class="doc-list">
        <li><a href="downloads/" target="_blank" rel="noopener">downloads/ を開く</a></li>
      </ul>
    </div>
  </section>

  <script src="assets/js/game.js"></script>
  <script src="assets/js/controller.js"></script>
</body>
</html>
