<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ロータス経営スゴロク（完成版）</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="container">
    <h1>ロータス経営スゴロク</h1>

    <section class="tabs">
      <button class="tab is-active" data-tab="roulette">ルーレット</button>
      <button class="tab" data-tab="board">盤面（36マス）</button>
      <button class="tab" data-tab="docs">資料</button>
    </section>

    <!-- ルーレット -->
    <section id="roulette" class="tab-panel is-active">
      <div class="roulette-wrap">
        <div class="pointer">▲</div>
        <div id="wheel" class="wheel">
          <!-- 6セグメント / 数字は各セグメントの重心に配置 -->
          <span class="label" data-idx="0">1</span>
          <span class="label" data-idx="1">2</span>
          <span class="label" data-idx="2">3</span>
          <span class="label" data-idx="3">4</span>
          <span class="label" data-idx="4">5</span>
          <span class="label" data-idx="5">6</span>
        </div>
      </div>

      <div class="controls">
        <label>現在のチーム：
          <select id="teamSelect">
            <option value="A" selected>A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
        </label>
        <button id="spinBtn">回す</button>
        <div class="result">停止 <span id="resultNum">–</span></div>
      </div>
    </section>

    <!-- 盤面 -->
    <section id="board" class="tab-panel">
      <div class="board-wrap">
        <div id="boardGrid" class="board-grid"></div>
      </div>
      <div class="legend">
        <span class="cell demo"></span> 現在位置（チーム別）
      </div>
    </section>

    <!-- 資料（埋め込み/差し替え自由） -->
    <section id="docs" class="tab-panel">
      <div class="docs-box">
        <p>公開用の配布資料は <code>downloads/</code> に置いてください。</p>
        <ul>
          <li>手順書（README.md）</li>
          <li>QR付チラシ（PDF）</li>
          <li>スライド（PPTX）</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="assets/js/game.js"></script>
  <script src="assets/js/controller.js"></script>
</body>
</html>
